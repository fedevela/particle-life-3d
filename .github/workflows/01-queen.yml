name: 01 Queen

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  queen:
    if: >
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'phase:queen') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: phase-queen-${{ github.event_name == 'issues' && github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - name: Ensure required labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'phase:queen', color: '1D76DB', description: 'Queue issue for Queen phase' },
              { name: 'phase:triad', color: '5319E7', description: 'Queue issue for Triad phase' },
              { name: 'needs:human', color: 'D93F0B', description: 'Needs human review or intervention' },
              { name: 'lock', color: 'B60205', description: 'Locked while automation is running' },
              { name: 'blocked', color: '000000', description: 'Blocked by dependency or external constraint' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
                } else {
                  throw error;
                }
              }
            }

      - name: Build Queen prompt from issue
        id: prompt
        uses: actions/github-script@v7
        with:
          script: |
            const rawIssueNumber = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs.issue_number
              : context.payload.issue.number;
            const issueNumber = Number(rawIssueNumber);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.setFailed(`Invalid issue number: ${rawIssueNumber}`);
              return;
            }
            const issue = (await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            })).data;
            const title = issue.title || '';
            const body = issue.body || '';
            const prompt = [
              'You are Queen in a software swarm workflow.',
              'Analyze the issue and produce a concise structured output for downstream implementation.',
              '',
              `Issue #${issueNumber}`,
              `Title: ${title}`,
              'Body:',
              body.trim() ? body : '(empty)',
              '',
              'Return practical implementation direction, constraints, and acceptance criteria.'
            ].join('
');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('prompt', prompt);

      - name: Run OpenHands resolver
        id: openhands
        continue-on-error: true
        uses: All-Hands-AI/OpenHands/.github/actions/openhands-resolver@main
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}

      - name: Upsert Queen artifact and transition labels
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.prompt.outputs.issue_number }}
          QUEEN_RESPONSE: ${{ steps.openhands.outputs.response }}
          ARTIFACT_MARKER: <!-- openhands-swarm:artifact:queen:structured -->
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const marker = process.env.ARTIFACT_MARKER;
            const response = (process.env.QUEEN_RESPONSE || '').trim();
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const existing = comments.find((comment) => (comment.body || '').includes(marker));
            const body = response
              ? `${marker}
## Queen Result

${response}`
              : `${marker}
## Queen Result

OpenHands returned empty output. Human intervention is required.`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            }
            if (response) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: 'phase:queen' });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['phase:triad']
              });
            } else {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['needs:human']
              });
            }
