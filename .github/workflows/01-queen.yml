name: 01 Queen

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number
        required: true
        type: number

permissions:
  issues: write
  contents: read

jobs:
  queen:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.label.name == 'phase:queen')
    concurrency:
      group: queen-issue-${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Resolve issue
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs?.issue_number)
              : Number(context.payload.issue?.number)
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.setFailed('Invalid issue_number')
              return
            }
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            })
            core.setOutput('number', String(issue.data.number))
            core.setOutput('title', issue.data.title || '')
            core.setOutput('body', issue.data.body || '')
      - name: Acquire lock
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- openhands-swarm:lock -->'
            const issueNumber = Number(process.env.ISSUE_NUMBER)
            const owner = context.repo.owner
            const repo = context.repo.repo
            const runOwner = `run-${context.runId}`
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            })
            const existing = comments.find((comment) => (comment.body || '').includes(marker))
            const parseOwner = (text) => {
              const match = text.match(/^Owner:\s*(.+)$/m)
              return match ? match[1].trim() : ''
            }
            const parseState = (text) => {
              const match = text.match(/^State:\s*(.+)$/m)
              return match ? match[1].trim() : ''
            }
            if (existing) {
              const existingOwner = parseOwner(existing.body || '')
              const existingState = parseState(existing.body || '')
              if (existingState === 'held' && existingOwner && existingOwner !== runOwner) {
                core.setFailed(`Lock is held by ${existingOwner}`)
                return
              }
            }
            const body = `${marker}\nOwner: ${runOwner}\nState: held`
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              })
            }
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['lock']
            })
      - name: Build queen prompt
        id: prompt
        run: |
          python3 - <<'PY'
          import os
          issue_number = os.environ.get('ISSUE_NUMBER', '')
          issue_title = os.environ.get('ISSUE_TITLE', '')
          issue_body = os.environ.get('ISSUE_BODY', '')
          parts = [
              'You are the Queen phase of a software swarm pipeline. Produce a structured execution artifact for implementation planning.',
              '',
              f'Issue #{issue_number}',
              f'Title: {issue_title}',
              '',
              'Body:',
              issue_body,
              '',
              'Return a clear, implementation-ready plan with phases, risks, assumptions, and acceptance criteria.'
          ]
          prompt = '\n'.join(parts)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write('prompt<<EOF\n')
              fh.write(prompt + '\n')
              fh.write('EOF\n')
          PY
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
      - name: Generate queen artifact
        id: openhands
        uses: All-Hands-AI/OpenHands/.github/actions/openhands-resolver@main
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
      - name: Upsert artifact and transition labels
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          RESPONSE: ${{ steps.openhands.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- openhands-swarm:artifact:queen:structured -->'
            const issueNumber = Number(process.env.ISSUE_NUMBER)
            const response = (process.env.RESPONSE || '').trim()
            const owner = context.repo.owner
            const repo = context.repo.repo
            const body = response.length > 0 ? `${marker}\n${response}` : `${marker}\n(no response)`
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            })
            const existing = comments.find((comment) => (comment.body || '').includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              })
            }
            if (response.length === 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['needs:human', 'phase:queen']
              })
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: 'phase:queen'
                })
              } catch (error) {
                if (error.status !== 404) {
                  throw error
                }
              }
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['phase:triad']
              })
            }
      - name: Release lock
        if: always()
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- openhands-swarm:lock -->'
            const issueNumber = Number(process.env.ISSUE_NUMBER)
            const owner = context.repo.owner
            const repo = context.repo.repo
            const runOwner = `run-${context.runId}`
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            })
            const existing = comments.find((comment) => (comment.body || '').includes(marker))
            let canRelease = false
            if (existing) {
              const ownerMatch = (existing.body || '').match(/^Owner:\s*(.+)$/m)
              const existingOwner = ownerMatch ? ownerMatch[1].trim() : ''
              if (existingOwner === runOwner) {
                canRelease = true
                const body = `${marker}\nOwner: ${runOwner}\nState: released`
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                })
              }
            }
            if (canRelease) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: 'lock'
                })
              } catch (error) {
                if (error.status !== 404) {
                  throw error
                }
              }
            }
